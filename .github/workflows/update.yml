name: update-and-deploy

on:
  schedule:
    - cron: '30 9 * * 5'   # 매주 금요일 09:30 UTC = 18:30 KST (KB 주간 발표)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests openpyxl
      - name: Collect KB data
        run: python kb_korea.py
      - name: Collect 부동산원(R-ONE) data
        env:
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
        run: python reb_korea.py
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: weekly refresh [skip ci]" || echo "변경 없음"
          git push || echo "푸시할 변경 없음"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
