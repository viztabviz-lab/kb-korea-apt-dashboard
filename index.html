<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 아파트 시세 대시보드 · KB부동산</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --card:#181b22; --line:#262a33; --txt:#e7e9ee; --sub:#9aa3b2;
    --buy:#ffb020; --jeon:#4aa3ff; --up:#ff5c5c; --down:#3ddc97; --accent:#ffb020;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:'Pretendard','Malgun Gothic',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 20px 60px}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:6px}
  h1{font-size:24px;margin:0;font-weight:800;letter-spacing:-.5px}
  h1 b{color:var(--accent)}
  .meta{color:var(--sub);font-size:13px;margin:2px 0 22px}
  .badge{display:inline-block;background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:3px 11px;font-size:12px;color:var(--sub);margin-left:6px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .card .label{color:var(--sub);font-size:13px;margin-bottom:6px}
  .card .val{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .card .chg{font-size:12.5px;margin-top:4px}
  .chg.up{color:var(--up)} .chg.down{color:var(--down)} .chg.flat{color:var(--sub)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px 8px}
  .panel h3{margin:0 0 4px;font-size:15px;font-weight:700}
  .panel .desc{color:var(--sub);font-size:12px;margin:0 0 10px}
  .panel.full{grid-column:1/-1}
  .chartbox{position:relative;height:300px}
  .row{display:flex;align-items:center;gap:8px;margin:0 0 10px}
  select{background:#11141a;color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:6px 10px;font-size:13px}
  footer{color:var(--sub);font-size:12px;margin-top:30px;text-align:center;line-height:1.7}
  a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>서울 <b>아파트 시세</b> 대시보드</h1>
    <span class="badge" id="asof-week"></span>
    <span class="badge" id="asof-month"></span>
  </header>
  <div class="meta">출처: KB부동산 데이터허브 · 갱신 <span id="updated"></span></div>

  <div class="cards" id="cards"></div>

  <div class="grid">
    <div class="panel">
      <h3>서울 가격지수 추이</h3>
      <p class="desc">주간 · 2022.1=100</p>
      <div class="chartbox"><canvas id="idxChart"></canvas></div>
    </div>
    <div class="panel">
      <h3>서울 평균가격 추이</h3>
      <p class="desc">월간 · 단위 억원</p>
      <div class="chartbox"><canvas id="avgChart"></canvas></div>
    </div>

    <div class="panel full">
      <div class="row">
        <h3 style="margin:0">자치구 비교</h3>
        <select id="metricSel">
          <option value="매매지수">매매 가격지수</option>
          <option value="전세지수">전세 가격지수</option>
          <option value="전세가율">전세가율(%)</option>
        </select>
      </div>
      <p class="desc">서울 25개 구 최신값 · 높은 순</p>
      <div class="chartbox" style="height:360px"><canvas id="guChart"></canvas></div>
    </div>

    <div class="panel full">
      <div class="row">
        <h3 style="margin:0">자치구별 매매 가격지수 추이</h3>
        <select id="guSel"></select>
      </div>
      <p class="desc">선택 구 vs 서울 평균</p>
      <div class="chartbox"><canvas id="guTrendChart"></canvas></div>
    </div>
  </div>

  <footer>
    데이터: <a href="https://data.kbland.kr/" target="_blank">KB부동산 데이터허브</a> 주택가격동향조사 ·
    자동 수집/배포 by GitHub Actions<br>
    원자료 다운로드: <a href="data/kb_seoul_시계열.csv">CSV</a> ·
    <a href="data/kb_seoul.json">JSON</a>
  </footer>
</div>

<script>
const fmt = n => n==null ? '–' : n.toLocaleString('ko-KR');
const GRID = '#262a33', SUB = '#9aa3b2';
Chart.defaults.color = SUB;
Chart.defaults.font.family = "'Pretendard','Malgun Gothic',sans-serif";

function changeHtml(cur, prev, suffix='', pct=false){
  if(cur==null||prev==null) return '';
  const diff = cur - prev;
  const cls = diff>0?'up':diff<0?'down':'flat';
  const arrow = diff>0?'▲':diff<0?'▼':'–';
  const v = pct ? (diff>=0?'+':'')+diff.toFixed(2)+'%p'
                : (diff>=0?'+':'')+diff.toFixed(2)+suffix;
  return `<div class="chg ${cls}">${arrow} ${v} <span style="color:var(--sub)">전기대비</span></div>`;
}

fetch('data/kb_seoul.json?_='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('updated').textContent = d.updated;
  document.getElementById('asof-week').textContent  = '주간 ' + d.asof.weekly;
  document.getElementById('asof-month').textContent = '월간 ' + (d.asof.monthly||'').slice(0,7);

  const S = d.series;
  const seoul = d.summary.find(s=>s.region==='서울');
  const lastTwo = arr => { const v=arr.filter(x=>x!=null); return [v.at(-1), v.at(-2)]; };
  const [mai, maiP] = lastTwo(S.매매평균.서울);
  const [jei, jeiP] = lastTwo(S.전세평균.서울);
  const [mxi, mxiP] = lastTwo(S.매매지수.서울);
  const [rti, rtiP] = lastTwo(S.전세가율.서울);

  // KPI 카드
  document.getElementById('cards').innerHTML = [
    {l:'매매 평균가', v:(mai/10000).toFixed(2)+'억', c:changeHtml(mai/10000, maiP/10000,'억')},
    {l:'전세 평균가', v:(jei/10000).toFixed(2)+'억', c:changeHtml(jei/10000, jeiP/10000,'억')},
    {l:'매매 가격지수', v:mxi.toFixed(2), c:changeHtml(mxi, mxiP)},
    {l:'전세가율', v:rti.toFixed(1)+'%', c:changeHtml(rti, rtiP,'',true)},
  ].map(c=>`<div class="card"><div class="label">${c.l}</div>
      <div class="val">${c.v}</div>${c.c}</div>`).join('');

  // 가격지수 추이
  new Chart(idxChart,{type:'line',data:{labels:S.매매지수.dates,
    datasets:[
      {label:'매매',data:S.매매지수.서울,borderColor:'#ffb020',backgroundColor:'#ffb02022',
        fill:true,tension:.25,pointRadius:0,borderWidth:2},
      {label:'전세',data:S.전세지수.서울,borderColor:'#4aa3ff',backgroundColor:'#4aa3ff15',
        fill:true,tension:.25,pointRadius:0,borderWidth:2},
    ]},options:lineOpts()});

  // 평균가격 추이 (억)
  const toEok = a => a.map(v=>v==null?null:+(v/10000).toFixed(2));
  new Chart(avgChart,{type:'line',data:{labels:S.매매평균.dates,
    datasets:[
      {label:'매매',data:toEok(S.매매평균.서울),borderColor:'#ffb020',
        backgroundColor:'#ffb02022',fill:true,tension:.25,pointRadius:0,borderWidth:2},
      {label:'전세',data:toEok(S.전세평균.서울),borderColor:'#4aa3ff',
        backgroundColor:'#4aa3ff15',fill:true,tension:.25,pointRadius:0,borderWidth:2},
    ]},options:lineOpts(v=>v+'억')});

  // 자치구 비교 (bar)
  const gus = d.summary.filter(s=>s.region!=='서울');
  let guChartObj;
  function drawGu(metric){
    const key = metric==='매매지수'?'매매지수':metric==='전세지수'?'전세지수':'전세가율';
    const rows = gus.map(s=>({r:s.region,v:s[key]})).filter(x=>x.v!=null)
                    .sort((a,b)=>b.v-a.v);
    const color = metric==='전세가율'?'#3ddc97':metric==='전세지수'?'#4aa3ff':'#ffb020';
    if(guChartObj) guChartObj.destroy();
    guChartObj = new Chart(guChart,{type:'bar',data:{labels:rows.map(x=>x.r),
      datasets:[{data:rows.map(x=>x.v),backgroundColor:color,borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{x:{grid:{color:GRID}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});
  }
  drawGu('매매지수');
  metricSel.onchange = e=>drawGu(e.target.value);

  // 자치구별 추이
  const guNames = Object.keys(S.매매지수).filter(k=>k!=='dates'&&k!=='서울');
  guSel.innerHTML = guNames.map(g=>`<option ${g==='강남구'?'selected':''}>${g}</option>`).join('');
  let guTrendObj;
  function drawTrend(gu){
    if(guTrendObj) guTrendObj.destroy();
    guTrendObj = new Chart(guTrendChart,{type:'line',data:{labels:S.매매지수.dates,
      datasets:[
        {label:gu,data:S.매매지수[gu],borderColor:'#ffb020',tension:.25,pointRadius:0,borderWidth:2},
        {label:'서울',data:S.매매지수.서울,borderColor:'#5b6373',borderDash:[5,4],
          tension:.25,pointRadius:0,borderWidth:1.5},
      ]},options:lineOpts()});
  }
  drawTrend('강남구');
  guSel.onchange = e=>drawTrend(e.target.value);
});

function lineOpts(yfmt){
  return {responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'top',labels:{boxWidth:12,padding:14}},
      tooltip:{callbacks: yfmt?{label:c=>c.dataset.label+': '+yfmt(c.parsed.y)}:{}}},
    scales:{x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:11}}},
      y:{grid:{color:GRID},ticks:{callback:yfmt?(v=>yfmt(v)):(v=>v)}}}};
}
</script>
</body>
</html>
